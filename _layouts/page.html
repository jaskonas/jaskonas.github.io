---
layout: default
---

<main id="main" role="main">
  <article class="page container">
    <header class="page-head">
{% assign eyebrow = page.kicker | remove_first: "// " %}{% if eyebrow != "" %}      <p class="kicker">{{ eyebrow }}</p>
{% endif %}
      <h1>{{ page.title }}</h1>
      {% if page.lead %}<p class="page-lead">{{ page.lead }}</p>{% endif %}
    </header>
    <div class="page-body{% if page.wide %} page-body--wide{% endif %}">
      {{ content }}
    </div>
  </article>
</main>
