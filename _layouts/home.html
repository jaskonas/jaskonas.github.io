---
layout: default
---

<main id="main" role="main">
  <section class="hero container">
    <p class="eyebrow hero-eyebrow">Technology &middot; War &middot; America</p>
    <div class="hero-body">
      <h1 class="hero-head">How nations learn, forget, and <em>remake themselves</em> under technological pressure.</h1>
      <div class="hero-bio">
        {{ content }}
      </div>
      <div class="hero-engraving" role="img" aria-label="Portrait of Jon Askonas"></div>
    </div>
  </section>

  <section class="home-menu container" aria-labelledby="menu-heading">
    <p class="eyebrow menu-label" id="menu-heading">Sections</p>
    <ul class="arrow-list">
      {% for link in site.data.menu %}
      <li>
        <a href="{{ link.url | relative_url }}">
          <span class="caret" aria-hidden="true">❯</span>
          <span class="al-main">{{ link.title }}</span>
          <span class="al-meta">{{ link.desc }}</span>
        </a>
      </li>
      {% endfor %}
    </ul>
  </section>
</main>
